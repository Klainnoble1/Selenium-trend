# Run Google Trends scraper on a schedule
name: Run Google Trends scraper

on:
  schedule:
    # every 6 hours at :15 UTC
    - cron: '15 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Google Trends scraper
        env:
          HEADLESS: 'true'
          COUNTRIES: ${{ vars.COUNTRIES }}
          COUNTRY_DELAY_SECONDS: ${{ vars.COUNTRY_DELAY_SECONDS }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          N8N_WEBHOOK_METHOD: ${{ vars.N8N_WEBHOOK_METHOD }}
          N8N_WEBHOOK_AUTH_HEADER: ${{ vars.N8N_WEBHOOK_AUTH_HEADER }}
          N8N_ACCESS_TOKEN: ${{ secrets.N8N_ACCESS_TOKEN }}
        run: python run_scraper.py
